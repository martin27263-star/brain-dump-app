    const ICONS = {Tasks:"✅",Ideas:"💡",Worries:"😟",Notes:"📝"};

    async function callClaude(system, user) {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system, user })
      });
      const text = await res.text();
      if (!text || text.trim() === "") throw new Error("Empty server response");
      let data;
      try { data = JSON.parse(text); } catch(e) { throw new Error("Server returned: " + text.slice(0,120)); }
      if (data.error) throw new Error(typeof data.error === "string" ? data.error : JSON.stringify(data.error));
      const content = data.content?.[0]?.text;
      if (!content) throw new Error("No content in response: " + JSON.stringify(data).slice(0,120));
      return content;
    }
