<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brain Dump</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #F8FAFC; color: #1E293B; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const TABS = ["Dump","Tasks","Ideas","Worries","Notes","Daily 3","Weekly Review"];
    const COLORS = {
      Tasks:{bg:"#EEF2FF",badge:"#6366F1",text:"#3730A3"},
      Ideas:{bg:"#F0FDF4",badge:"#22C55E",text:"#15803D"},
      Worries:{bg:"#FFF7ED",badge:"#F97316",text:"#C2410C"},
      Notes:{bg:"#F0F9FF",badge:"#0EA5E9",text:"#0369A1"},
    };
    const ICONS = {Tasks:"Ō£ģ",Ideas:"­¤ÆĪ",Worries:"­¤ś¤",Notes:"­¤ōØ"};

    async function callClaude(system, user) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1000,
          system,
          messages:[{role:"user",content:user}]
        })
      });
      const data = await res.json();
      return data.content?.[0]?.text || "";
    }

    function App() {
      const [tab, setTab] = React.useState("Dump");
      const [dumpText, setDumpText] = React.useState("");
      const [loading, setLoading] = React.useState(false);
      const [sorted, setSorted] = React.useState({Tasks:[],Ideas:[],Worries:[],Notes:[]});
      const [daily3, setDaily3] = React.useState([]);
      const [weeklyReview, setWeeklyReview] = React.useState("");
      const [reviewLoading, setReviewLoading] = React.useState(false);
      const [d3Loading, setD3Loading] = React.useState(false);
      const [allDumps, setAllDumps] = React.useState([]);
      const [done, setDone] = React.useState([]);
      const [toast, setToast] = React.useState("");

      const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(""),2500); };
      const total = Object.values(sorted).flat().length;

      async function handleDump() {
        if (!dumpText.trim()) return;
        setLoading(true);
        try {
          const sys = `Sort the user's brain dump into Tasks, Ideas, Worries, Notes. Return ONLY valid JSON, no markdown:
{"Tasks":["..."],"Ideas":["..."],"Worries":["..."],"Notes":["..."]}
Tasks=actionable, Ideas=creative thoughts, Worries=concerns/fears, Notes=facts/reminders.`;
          const raw = await callClaude(sys, `Sort this:\n${dumpText}`);
          const parsed = JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g,"").trim());
          setSorted(p=>({
            Tasks:[...p.Tasks,...(parsed.Tasks||[])],
            Ideas:[...p.Ideas,...(parsed.Ideas||[])],
            Worries:[...p.Worries,...(parsed.Worries||[])],
            Notes:[...p.Notes,...(parsed.Notes||[])],
          }));
          setAllDumps(p=>[...p,{text:dumpText,date:new Date().toLocaleDateString(),parsed}]);
          setDumpText(""); showToast("Ō£© Sorted!"); setTab("Tasks");
        } catch { showToast("ŌÜĀ’ĖÅ Try again."); }
        setLoading(false);
      }

      async function genDaily3() {
        const tasks = sorted.Tasks.filter(t=>!done.includes(t));
        if (!tasks.length){showToast("Add some tasks first!"); return;}
        setD3Loading(true);
        try {
          const sys = `Pick the 3 most important tasks. Return ONLY valid JSON: {"daily3":["task1","task2","task3"]}`;
          const raw = await callClaude(sys,`Tasks: ${JSON.stringify(tasks)}`);
          const parsed = JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g,"").trim());
          setDaily3(parsed.daily3||[]); showToast("­¤Ä» Daily 3 ready!");
        } catch { showToast("ŌÜĀ’ĖÅ Try again."); }
        setD3Loading(false);
      }

      async function genReview() {
        if (!allDumps.length){showToast("Do some brain dumps first!"); return;}
        setReviewLoading(true);
        try {
          const sys = `You are a productivity coach. Write a warm weekly review under 300 words. Include themes, progress, recurring worries, top ideas, and 3 suggestions. Use emojis.`;
          const txt = await callClaude(sys,`Brain dumps: ${JSON.stringify(allDumps)}`);
          setWeeklyReview(txt);
        } catch { showToast("ŌÜĀ’ĖÅ Try again."); }
        setReviewLoading(false);
      }

      const removeItem = (cat,item) => setSorted(p=>({...p,[cat]:p[cat].filter(i=>i!==item)}));
      const toggleDone = (t) => setDone(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);

      const btnStyle = (disabled) => ({
        width:"100%", padding:"13px 20px",
        background: disabled?"#C7D2FE":"linear-gradient(135deg,#6366F1,#8B5CF6)",
        color:"#fff", border:"none", borderRadius:12, fontSize:14, fontWeight:700,
        cursor: disabled?"not-allowed":"pointer", marginBottom:16
      });

      return (
        <div style={{fontFamily:"'Segoe UI',sans-serif",background:"#F8FAFC",minHeight:"100vh"}}>
          {/* Header */}
          <div style={{background:"#fff",borderBottom:"1px solid #E2E8F0",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:34,height:34,background:"linear-gradient(135deg,#6366F1,#8B5CF6)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>­¤¦Ā</div>
              <div>
                <div style={{fontWeight:700,fontSize:17}}>Brain Dump</div>
                <div style={{fontSize:11,color:"#94A3B8"}}>Clear your mind. Find your focus.</div>
              </div>
            </div>
            {total>0 && <div style={{background:"#EEF2FF",color:"#6366F1",borderRadius:20,padding:"3px 12px",fontSize:13,fontWeight:600}}>{total} items</div>}
          </div>

          {/* Toast */}
          {toast && <div style={{position:"fixed",top:76,left:"50%",transform:"translateX(-50%)",background:"#1E293B",color:"#fff",padding:"9px 20px",borderRadius:30,fontSize:13,fontWeight:500,zIndex:100,boxShadow:"0 4px 20px rgba(0,0,0,0.15)"}}>{toast}</div>}

          {/* Tabs */}
          <div style={{background:"#fff",borderBottom:"1px solid #E2E8F0",padding:"0 12px",display:"flex",gap:2,overflowX:"auto"}}>
            {TABS.map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{padding:"11px 14px",border:"none",background:"none",cursor:"pointer",fontSize:12,fontWeight:tab===t?700:500,color:tab===t?"#6366F1":"#64748B",borderBottom:tab===t?"2px solid #6366F1":"2px solid transparent",whiteSpace:"nowrap"}}>{t}</button>
            ))}
          </div>

          <div style={{maxWidth:680,margin:"0 auto",padding:"22px 16px"}}>

            {/* DUMP */}
            {tab==="Dump" && (
              <div>
                <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 4px"}}>What's on your mind? ­¤ī¬’ĖÅ</h2>
                <p style={{color:"#64748B",margin:"0 0 16px",fontSize:13}}>Dump everything ŌĆö tasks, ideas, worries. Don't filter, just write.</p>
                <textarea value={dumpText} onChange={e=>setDumpText(e.target.value)}
                  placeholder={"I need to call the doctor\nHave an idea for a new app\nWorried about rent\nPick up groceries\n\nJust type it all out!"}
                  style={{width:"100%",minHeight:200,padding:16,fontSize:14,border:"2px solid #E2E8F0",borderRadius:14,resize:"vertical",outline:"none",lineHeight:1.7,color:"#1E293B",background:"#fff",fontFamily:"inherit"}}/>
                <button onClick={handleDump} disabled={loading||!dumpText.trim()} style={btnStyle(loading||!dumpText.trim())}>
                  {loading?"Ō£© Sorting...":"­¤¦Ā Dump & Sort with AI"}
                </button>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:4}}>
                  {Object.entries(COLORS).map(([cat,c])=>(
                    <div key={cat} onClick={()=>setTab(cat)} style={{background:c.bg,border:`1px solid ${c.badge}33`,borderRadius:14,padding:"14px",cursor:"pointer"}}>
                      <div style={{fontSize:20}}>{ICONS[cat]}</div>
                      <div style={{fontWeight:700,color:c.text,fontSize:14,marginTop:4}}>{cat}</div>
                      <div style={{fontSize:12,color:c.badge,fontWeight:600}}>{sorted[cat].length} items</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* CATEGORIES */}
            {["Tasks","Ideas","Worries","Notes"].includes(tab) && (
              <div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                  <div>
                    <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 2px"}}>{ICONS[tab]} {tab}</h2>
                    <p style={{color:"#64748B",margin:0,fontSize:13}}>{sorted[tab].length} items</p>
                  </div>
                  {tab==="Tasks" && <button onClick={()=>{setTab("Daily 3");genDaily3();}} style={{padding:"9px 16px",background:"#6366F1",color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer"}}>­¤Ä» Daily 3</button>}
                </div>
                {sorted[tab].length===0?(
                  <div style={{textAlign:"center",padding:"50px 20px",color:"#94A3B8"}}>
                    <div style={{fontSize:44,marginBottom:10}}>{ICONS[tab]}</div>
                    <div style={{fontWeight:600}}>No {tab.toLowerCase()} yet</div>
                    <div style={{fontSize:13,marginTop:4}}>Go to Dump and add some thoughts!</div>
                  </div>
                ):sorted[tab].map((item,i)=>(
                  <div key={i} style={{background:"#fff",border:`1px solid ${COLORS[tab].badge}33`,borderRadius:12,padding:"13px 15px",display:"flex",alignItems:"flex-start",gap:10,marginBottom:8,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                    {tab==="Tasks" && <input type="checkbox" checked={done.includes(item)} onChange={()=>toggleDone(item)} style={{marginTop:2,accentColor:"#6366F1",width:15,height:15,cursor:"pointer",flexShrink:0}}/>}
                    <span style={{flex:1,fontSize:14,lineHeight:1.6,textDecoration:tab==="Tasks"&&done.includes(item)?"line-through":"none",opacity:done.includes(item)?0.4:1}}>{item}</span>
                    <button onClick={()=>removeItem(tab,item)} style={{background:"none",border:"none",color:"#CBD5E1",cursor:"pointer",fontSize:15}}>Ō£Ģ</button>
                  </div>
                ))}
              </div>
            )}

            {/* DAILY 3 */}
            {tab==="Daily 3" && (
              <div>
                <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 4px"}}>­¤Ä» Your Daily 3</h2>
                <p style={{color:"#64748B",margin:"0 0 16px",fontSize:13}}>AI picks your 3 most important tasks for today.</p>
                <button onClick={genDaily3} disabled={d3Loading} style={btnStyle(d3Loading)}>
                  {d3Loading?"­¤żö Choosing...":"Ō£© Generate Daily 3"}
                </button>
                {daily3.length>0?daily3.map((task,i)=>(
                  <div key={i} style={{background:"#fff",border:"2px solid #6366F1",borderRadius:14,padding:"16px",display:"flex",gap:12,alignItems:"flex-start",marginBottom:12,boxShadow:"0 2px 12px rgba(99,102,241,0.08)"}}>
                    <div style={{width:30,height:30,background:"linear-gradient(135deg,#6366F1,#8B5CF6)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:13,flexShrink:0}}>{i+1}</div>
                    <div style={{fontSize:14,fontWeight:600,lineHeight:1.5}}>{task}</div>
                  </div>
                )):(
                  <div style={{textAlign:"center",padding:"40px 20px",color:"#94A3B8"}}>
                    <div style={{fontSize:44,marginBottom:10}}>­¤Ä»</div>
                    <div style={{fontWeight:600}}>Hit the button above to get your Daily 3</div>
                  </div>
                )}
              </div>
            )}

            {/* WEEKLY REVIEW */}
            {tab==="Weekly Review" && (
              <div>
                <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 4px"}}>­¤ōŖ Weekly Review</h2>
                <p style={{color:"#64748B",margin:"0 0 16px",fontSize:13}}>AI insights on your week ŌĆö patterns, progress & next steps.</p>
                <div style={{background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:12,padding:"14px",marginBottom:16,display:"flex",gap:12}}>
                  {[["Dumps",allDumps.length],["Tasks",sorted.Tasks.length],["Ideas",sorted.Ideas.length],["Worries",sorted.Worries.length]].map(([l,v])=>(
                    <div key={l} style={{flex:1,textAlign:"center"}}>
                      <div style={{fontSize:20,fontWeight:800,color:"#6366F1"}}>{v}</div>
                      <div style={{fontSize:11,color:"#94A3B8"}}>{l}</div>
                    </div>
                  ))}
                </div>
                <button onClick={genReview} disabled={reviewLoading} style={btnStyle(reviewLoading)}>
                  {reviewLoading?"­¤żö Analysing...":"­¤ōŖ Generate Weekly Review"}
                </button>
                {weeklyReview?(
                  <div style={{background:"#fff",border:"1px solid #E2E8F0",borderRadius:14,padding:"20px",lineHeight:1.8,fontSize:14,whiteSpace:"pre-wrap",boxShadow:"0 2px 12px rgba(0,0,0,0.04)"}}>{weeklyReview}</div>
                ):(
                  <div style={{textAlign:"center",padding:"40px 20px",color:"#94A3B8"}}>
                    <div style={{fontSize:44,marginBottom:10}}>­¤ōŖ</div>
                    <div style={{fontWeight:600}}>Your review will appear here</div>
                    <div style={{fontSize:13,marginTop:4}}>Do a few brain dumps first!</div>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
